<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Quiz Zone — plateforme de quiz académiques interactifs générés par IA." />
  <title>Quiz Zone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- scaffold-managed:minimal-modern -->
  <main class="page" aria-live="polite">
    <header class="topbar">
      <div class="topbar-left">
        <p class="eyebrow">Bibliothèque de Quiz</p>
        <h1>Quiz Zone</h1>
      </div>
    </header>

    <section class="layout" aria-label="Espace quiz">
      <aside class="panel panel-list" aria-labelledby="quiz-list-title">
        <div class="panel-head">
          <h2 id="quiz-list-title">Quiz disponibles</h2>
          <span id="quiz-count" class="chip">0</span>
        </div>
        <p class="panel-sub">Sélectionne un chapitre pour commencer.</p>
        <div id="quiz-list" class="quiz-list"></div>
        <div id="list-error" class="inline-alert hidden" role="alert"></div>
      </aside>

      <section id="quiz-panel" class="panel panel-main" aria-labelledby="session-title">
        <h2 id="session-title" class="sr-only">Session</h2>
        <div id="panel-content">
          <div class="empty-state">
            <div class="empty-icon">📚</div>
            <p class="empty-title">Aucun quiz chargé</p>
            <p class="empty-sub"> Dev par Baudouin Theophile, system full autonome 🤖</p>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
